{% extends "base_auth.html" %}
{% block page_title %}
Register
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>🚀 Create Account</h1>

        <p>Start building your AI Second Brain.</p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="primary-btn">
                Create Account
            </button>

        </form>

        <p class="switch-link">
            Already have an account?
            <a href="{% url 'login' %}">
                Login
            </a>
        </p>

    </div>

</div>

{% endblock %}
